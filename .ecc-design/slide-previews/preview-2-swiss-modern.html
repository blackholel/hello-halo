<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview 2: Swiss Modern</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Mandatory Base */
        html, body { height: 100%; overflow-x: hidden; }
        html { scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .slide {
            width: 100vw; height: 100vh; height: 100dvh;
            overflow: hidden; scroll-snap-align: start;
            display: flex; flex-direction: column; position: relative;
        }
        .slide-content {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; max-height: 100%;
            overflow: hidden; padding: var(--slide-padding);
        }
        :root {
            --title-size: clamp(1.5rem, 5vw, 4rem);
            --h2-size: clamp(1.25rem, 3.5vw, 2.5rem);
            --body-size: clamp(0.75rem, 1.5vw, 1.125rem);
            --slide-padding: clamp(1rem, 4vw, 4rem);
        }

        /* Swiss Modern Preset */
        :root {
            --bg-base: #ffffff;
            --text-primary: #111111;
            --text-secondary: #666666;
            --accent-red: #e63946;
            --grid-line: #e0e0e0;
        }

        body {
            margin: 0;
            font-family: 'Archivo', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
        }

        .slide {
            background: var(--bg-base);
        }

        /* Grid overlay */
        .slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: 0.4;
            pointer-events: none;
        }

        .slide-content {
            align-items: flex-start;
            padding-left: 8vw;
        }

        /* Big number */
        .slide-number {
            position: absolute;
            top: 4rem;
            right: 4rem;
            font-size: 12rem;
            font-weight: 700;
            line-height: 1;
            color: var(--accent-red);
            opacity: 0.15;
        }

        h1 {
            font-family: 'Archivo', sans-serif;
            font-size: var(--title-size);
            font-weight: 700;
            line-height: 1;
            margin: 0;
            letter-spacing: -0.03em;
            max-width: 700px;
        }

        h1 span {
            color: var(--accent-red);
        }

        .subtitle {
            font-family: 'Nunito', sans-serif;
            font-size: var(--body-size);
            color: var(--text-secondary);
            max-width: 450px;
            margin-top: 1.5rem;
            line-height: 1.5;
        }

        /* Asymmetric layout */
        .slide-content::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-red);
        }

        .divider {
            width: 80px;
            height: 4px;
            background: var(--text-primary);
            margin-top: 2rem;
        }

        .tags {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .tag {
            font-family: 'Nunito', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            border: 1.5px solid var(--text-primary);
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <section class="slide">
        <div class="slide-content">
            <h1>知识库<br><span>整理方案</span></h1>
            <p class="subtitle">从混乱到有序：构建个人知识管理系统的完整指南。解决重复目录、层级过深、缺少入口等常见问题。</p>
            <div class="divider"></div>
            <div class="tags">
                <span class="tag">Obsidian</span>
                <span class="tag">PKM</span>
                <span class="tag">方法论</span>
            </div>
        </div>
        <div class="slide-number">01</div>
    </section>
</body>
</html>
